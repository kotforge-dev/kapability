name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macOS is required: the KMP library modules have iOS (Kotlin/Native) targets that only
    # build on an Apple toolchain. The job stays light — build + publishToMavenLocal, no
    # emulator/simulator runs.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build + publishToMavenLocal (validates artifacts, POMs, plugin marker)
        run: ./gradlew build publishToMavenLocal --stacktrace
