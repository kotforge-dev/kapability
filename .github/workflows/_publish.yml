name: Publish

# Reusable: signs + publishes a given version to Maven Central + the Gradle Plugin Portal.
# Called by release-please (automated) and by the manual release workflow.
on:
  workflow_call:
    inputs:
      version:
        description: 'Version to publish, e.g. 0.1.0'
        required: true
        type: string

jobs:
  publish:
    # macOS: the KMP libraries have iOS (Kotlin/Native) targets that only build on an Apple toolchain.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # 1) Build + sign all library artifacts into build/staging-deploy.
      - name: Stage signed artifacts
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAllPublicationsToStagingRepository -PkapabilityVersion=${{ inputs.version }} --stacktrace

      # 2) Bundle + upload to the Sonatype Central Portal (built-in path, no third-party uploader).
      - name: Upload bundle to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          ( cd build/staging-deploy && zip -qr ../central-bundle.zip . )
          AUTH=$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64)
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${AUTH}" \
            -F bundle=@build/central-bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?name=kapability-${{ inputs.version }}&publishingType=USER_MANAGED"

      # 3) Publish the Gradle plugin to the Gradle Plugin Portal.
      - name: Publish plugin to the Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew :kapability-gradle-plugin:publishPlugins -PkapabilityVersion=${{ inputs.version }} --stacktrace
