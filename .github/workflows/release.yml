name: Release (manual)

# Manual fallback: publish a specific version on demand (Actions tab -> Run workflow).
# The normal path is automated via release-please; use this only for a manual/re-publish.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, e.g. 0.1.0'
        required: true

jobs:
  publish:
    uses: ./.github/workflows/_publish.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit
