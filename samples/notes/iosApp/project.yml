name: iosApp
options:
  bundleIdPrefix: dev.kapability
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      # The SKIE-processed KMP framework. embed+sign so the simulator app can load it.
      - framework: ../shared/build/XCFrameworks/debug/Shared.xcframework
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.kapability.iosApp
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
  iosAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.kapability.iosAppTests
schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    test:
      targets:
        - iosAppTests
    run:
      config: Debug
